# star-search API 反代配置 (v16.1)
# 用法（恒星01 操作）:
#   1. 复制此文件到 /etc/nginx/sites-available/star-search.conf
#   2. sudo ln -s /etc/nginx/sites-available/star-search.conf /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo nginx -s reload
#
# ⚠️ 注意: 此配置不与 token-star.cn 现有 server 冲突
# ⚠️ 注意: listen 80 必须放在你现有 server 后面（不能有 default_server）
# ⚠️ 注意: SSL 证书复用 /etc/letsencrypt/live/token-star.cn/

upstream star_search_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

# 子域独立方案: api.token-star.cn (推荐 - 不影响主域)
server {
    listen 80;
    server_name api.token-star.cn;

    # 重定向到 https
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.token-star.cn;

    ssl_certificate /etc/letsencrypt/live/token-star.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/token-star.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://star_search_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # 简单限流（防滥用 - 每 IP 60 req/min）
        limit_req_zone $binary_remote_addr zone=star_api:10m rate=60r/m;
        limit_req zone=star_api burst=20 nodelay;
    }
}
